<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holy Lyrics - Igreja Fé Apostólica Americana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>🎵 Holy Lyrics</h1>
                <p>Igreja Fé Apostólica Americana</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Search Bar -->
            <div class="search-section">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Buscar hino ou música..."
                >
            </div>

            <!-- Lyrics Display -->
            <div class="lyrics-container">
                <div id="lyricsDisplay" class="lyrics-display">
                    <p class="welcome-text">Selecione um hino para exibir as letras</p>
                </div>
            </div>

            <!-- Hymns List -->
            <div class="hymns-section">
                <h2>Hinos e Músicas</h2>
                <div id="hymnsList" class="hymns-list">
                    <!-- Hymns will be loaded here -->
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Igreja Fé Apostólica Americana - Holy Lyrics</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
